<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>


    Ordered list: 
    <ol type = "i">
        <p>List of faculty in CCT: </p>
        <li>CSIT</li>
        <li>BITM</li>
        <li>BCA</li>
    </ol>

    Unordered list: 
    <ul type = "circle">
        <p>List of faculty in CCT: </p>
        <li>CSIT</li>
        <li>BITM</li>
        <li>BCA</li>
    </ul>

    <p>Nested list: </p>
    <h2>Cafe Menu: </h2>
    <ol>
        <li>Hot Drinks
            <ol type = "A">
                <li>Cappuccino</li>
                <li>Coffee</li>
            </ol>
        </li>

        <li>Cold Drinks
            <ul type = "square">
                <li>Ice Latte</li>
                <li>Milkshake</li>
            </ul>
        </li>
    </ol>


</body>
</html>
